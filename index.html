<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VD5 E-Checklist</title>
<style>
/* ============================================================
   VD5 E-Checklist v5 — Design: Industrial / Utilitarian Dark
   Palette: Navy #1a3a5c | Accent #00b4d8 | Warn #ff6b35 | OK #2ec4b6
============================================================ */
:root {
  --bg:        #0f1923;
  --surface:   #182634;
  --border:    #263748;
  --navy:      #1a3a5c;
  --accent:    #00b4d8;
  --ok:        #2ec4b6;
  --warn:      #ff6b35;
  --danger:    #e63946;
  --text:      #e8edf2;
  --sub:       #7a90a4;
  --white:     #ffffff;
  --day-col:   #f4a261;
  --night-col: #7b68ee;
  --r:         14px;
  --r-sm:      8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',system-ui,sans-serif;font-size:15px;}
.app{max-width:520px;margin:0 auto;padding:0 0 80px;}

/* ── SCREEN ── */
.screen{display:none;}
.screen.active{display:block;}

/* ── TOPBAR ── */
.topbar{
  background:linear-gradient(135deg,#1a3a5c 0%,#0f2035 100%);
  border-bottom:1px solid var(--border);
  padding:14px 18px 12px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;
}
.topbar-logo{
  width:34px;height:34px;border-radius:8px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#000;letter-spacing:-.5px;flex-shrink:0;
}
.topbar-info{flex:1;min-width:0;}
.topbar-title{font-size:15px;font-weight:700;color:var(--white);line-height:1.2;}
.topbar-sub{font-size:11px;color:var(--sub);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-badge{
  padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0;
  background:var(--day-col);color:#000;
}
.topbar-badge.night{background:var(--night-col);color:#fff;}
.topbar-back{background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer;padding:4px;flex-shrink:0;}

/* ── CARD ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:16px 18px;margin:12px 12px 0;
}
.card-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-bottom:10px;font-weight:600;}

/* ── INPUT ── */
.input-group{margin-bottom:10px;}
.input-group label{font-size:12px;color:var(--sub);margin-bottom:4px;display:block;}
.inp{
  width:100%;background:#0f1923;border:1.5px solid var(--border);
  border-radius:var(--r-sm);padding:11px 13px;color:var(--text);font-size:15px;
  outline:none;transition:border-color .2s;
}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:var(--sub);}

/* ── BTN ── */
.btn{
  width:100%;padding:14px;border-radius:var(--r-sm);
  border:none;cursor:pointer;font-size:15px;font-weight:700;
  transition:opacity .15s,transform .1s;letter-spacing:.02em;
  -webkit-user-select:none;user-select:none;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--accent);color:#000;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sm{width:auto;padding:8px 16px;font-size:13px;}

/* ── STATUS BANNER ── */
.banner{
  margin:12px 12px 0;padding:12px 16px;border-radius:var(--r-sm);
  font-size:13px;font-weight:600;display:none;
  animation:fadein .3s ease;
}
@keyframes fadein{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.banner.ok{background:#1a3a34;border:1px solid var(--ok);color:var(--ok);}
.banner.err{background:#3a1a1a;border:1px solid var(--danger);color:var(--danger);}
.banner.warn{background:#3a2a1a;border:1px solid var(--warn);color:var(--warn);}
.banner.show{display:block;}

/* ── PLEDGE ── */
.pledge-box{
  background:#0f1923;border:1px solid var(--border);
  border-radius:var(--r-sm);padding:14px 16px;font-size:13px;
  line-height:1.8;color:var(--sub);margin-bottom:14px;
}
.pledge-box strong{color:var(--text);}
.pledge-check{display:flex;align-items:center;gap:10px;cursor:pointer;padding:4px 0;}
.pledge-check input{width:20px;height:20px;accent-color:var(--accent);flex-shrink:0;}
.pledge-check span{font-size:14px;font-weight:600;color:var(--text);}

/* ── CHECKLIST ── */
.section-head{
  padding:6px 18px 4px;
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--sub);margin-top:12px;
}
.check-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-sm);margin:4px 12px;
  transition:border-color .15s;overflow:hidden;
}
.check-item.done{border-color:var(--ok);}
.check-item.ng{border-color:var(--warn);}
.check-item-row{
  display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer;
}
.check-icon{
  width:26px;height:26px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:14px;
  flex-shrink:0;transition:all .2s;
}
.check-item.done .check-icon{background:var(--ok);border-color:var(--ok);color:#000;}
.check-item.ng   .check-icon{background:var(--warn);border-color:var(--warn);color:#000;}
.check-label{flex:1;font-size:14px;line-height:1.4;}
.check-code{font-size:11px;color:var(--sub);font-family:monospace;}
.ng-toggle{font-size:11px;color:var(--warn);padding:0 15px 0 0;font-weight:600;background:none;border:none;cursor:pointer;flex-shrink:0;}
.ng-memo{
  max-height:0;overflow:hidden;transition:max-height .25s ease;
  background:#0f1923;
}
.ng-memo.open{max-height:120px;}
.ng-memo textarea{
  width:100%;background:transparent;border:none;border-top:1px solid var(--border);
  padding:10px 15px;color:var(--text);font-size:13px;resize:none;height:80px;outline:none;
}
.ng-memo textarea::placeholder{color:var(--sub);}

/* ── EXTRA INPUTS ── */
.extra-section{margin:12px 12px 0;}
.extra-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}

/* ── PROGRESS BAR ── */
.progress-wrap{margin:10px 12px 0;}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:5px;}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease;}

/* ── SUBMIT AREA ── */
.submit-area{padding:12px;margin-top:4px;}

/* ── HISTORY CARD ── */
.history-item{
  background:#0f1923;border:1px solid var(--border);border-radius:var(--r-sm);
  padding:12px 15px;margin-bottom:8px;font-size:13px;
}
.history-item .hi-top{display:flex;justify-content:space-between;margin-bottom:6px;}
.history-item .hi-name{font-weight:700;color:var(--accent);}
.history-item .hi-time{color:var(--sub);font-size:12px;}
.history-item .hi-rate{font-size:18px;font-weight:800;color:var(--ok);}
.history-item .hi-ng{color:var(--warn);font-size:12px;font-weight:600;}
/* NG 상세 펼치기 */
.ng-detail-toggle{
  background:none;border:1px solid var(--border);border-radius:4px;
  color:var(--sub);font-size:11px;padding:3px 8px;cursor:pointer;margin-top:6px;
  display:inline-flex;align-items:center;gap:4px;
}
.ng-detail-body{
  background:#1a1a2a;border:1px solid var(--border);border-radius:4px;
  padding:8px 10px;font-size:12px;color:var(--warn);margin-top:6px;
  display:none;line-height:1.6;
}
.ng-detail-body.open{display:block;}

/* ── DASHBOARD ── */
.dash-tabs{
  display:flex;border-bottom:1px solid var(--border);
  padding:0 12px;margin-bottom:0;background:var(--surface);
  position:sticky;top:64px;z-index:50;
}
.dash-tab{
  flex:1;padding:12px 0;text-align:center;font-size:13px;font-weight:600;
  color:var(--sub);border-bottom:2px solid transparent;cursor:pointer;
  background:none;border-top:none;border-left:none;border-right:none;
  transition:color .2s;
}
.dash-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.dash-pane{display:none;padding:12px 12px 0;}
.dash-pane.active{display:block;}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.kpi-card{
  background:#0f1923;border:1px solid var(--border);
  border-radius:var(--r-sm);padding:12px;text-align:center;
}
.kpi-val{font-size:26px;font-weight:800;color:var(--accent);line-height:1.1;}
.kpi-val.ok{color:var(--ok);}
.kpi-val.warn{color:var(--warn);}
.kpi-lbl{font-size:11px;color:var(--sub);margin-top:3px;}

/* ── ZONE TABLE ── */
.zone-list{display:flex;flex-direction:column;gap:6px;}
.zone-row{
  background:#0f1923;border:1px solid var(--border);border-radius:var(--r-sm);
  padding:11px 14px;display:flex;align-items:center;gap:10px;
}
.zone-row.missing{border-color:var(--danger);background:#1a0f0f;}
.zone-row.missing .zone-status{color:var(--danger);}
.zone-row.done{border-color:var(--ok);}
.zone-row.done .zone-status{color:var(--ok);}
.zone-name{font-size:13px;font-weight:700;flex:1;}
.zone-sub{font-size:11px;color:var(--sub);}
.zone-status{font-size:18px;}
.missing-deadline{
  font-size:11px;font-weight:700;
  background:var(--danger);color:#fff;
  border-radius:4px;padding:2px 6px;margin-left:auto;flex-shrink:0;
}

/* ── DATE PICKER AREA ── */
.date-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
.date-row input[type=date]{
  flex:1;background:#0f1923;border:1.5px solid var(--border);
  border-radius:var(--r-sm);padding:10px 12px;
  color:var(--text);font-size:14px;outline:none;
}
.date-row input[type=date]:focus{border-color:var(--accent);}

/* ── WEEKLY TABLE ── */
.weekly-table{width:100%;border-collapse:collapse;font-size:12px;}
.weekly-table th{
  background:#0f1923;color:var(--sub);font-weight:600;
  padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;
}
.weekly-table td{
  padding:9px 10px;border-bottom:1px solid var(--border);color:var(--text);
}
.weekly-table tr:last-child td{border-bottom:none;}
.rate-bar{
  width:60px;height:6px;background:var(--border);border-radius:3px;display:inline-block;vertical-align:middle;overflow:hidden;margin-left:4px;
}
.rate-fill{height:100%;background:var(--ok);border-radius:3px;}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;padding-bottom:env(safe-area-inset-bottom,0px);
  z-index:200;display:none;
  max-width:520px;margin:0 auto;left:50%;transform:translateX(-50%);
  width:100%;
}
.bottom-nav.show{display:flex;}
.nav-btn{
  flex:1;padding:10px 4px 8px;background:none;border:none;cursor:pointer;
  color:var(--sub);font-size:11px;font-weight:600;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:color .2s;
}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:20px;line-height:1;}

/* ── SPINNER ── */
.spinner-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  display:none;align-items:center;justify-content:center;z-index:999;
}
.spinner-overlay.show{display:flex;}
.spinner{
  width:44px;height:44px;border:4px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MISC ── */
.divider{height:1px;background:var(--border);margin:14px 12px;}
.empty-msg{text-align:center;padding:32px 0;color:var(--sub);font-size:14px;}
.tag{
  display:inline-block;padding:2px 7px;border-radius:4px;
  font-size:11px;font-weight:700;
}
.tag-day{background:rgba(244,162,97,.15);color:var(--day-col);}
.tag-night{background:rgba(123,104,238,.2);color:var(--night-col);}

/* ── SAFE AREA ── */
@supports(padding-bottom: env(safe-area-inset-bottom)){
  .app{padding-bottom:calc(72px + env(safe-area-inset-bottom));}
}
</style>
</head>
<body>
<div class="app">

<!-- ══════════════════════════════════════════════════════
  SCREEN 1: 로그인
══════════════════════════════════════════════════════ -->
<div class="screen active" id="screen-login">
  <div style="padding:40px 12px 20px;text-align:center;">
    <div style="font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--sub);margin-bottom:8px;">KUKDONG — VD5 창고</div>
    <div style="font-size:26px;font-weight:800;color:var(--white);margin-bottom:4px;">E-Checklist</div>
    <div style="font-size:13px;color:var(--sub);">전자 점검 시스템</div>
  </div>
  <div class="card">
    <div class="card-label">로그인</div>
    <div class="input-group">
      <label>아이디</label>
      <input class="inp" id="login-id" type="text" placeholder="아이디 입력" autocomplete="username" autocapitalize="none">
    </div>
    <div class="input-group" style="margin-bottom:14px;">
      <label>비밀번호</label>
      <input class="inp" id="login-pw" type="password" placeholder="비밀번호 입력" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="btn-login">로그인</button>
  </div>
  <div class="banner" id="login-msg"></div>
</div>

<!-- ══════════════════════════════════════════════════════
  SCREEN 2: 서약
══════════════════════════════════════════════════════ -->
<div class="screen" id="screen-pledge">
  <div class="topbar">
    <div class="topbar-logo">KD</div>
    <div class="topbar-info">
      <div class="topbar-title" id="pledge-name-title">점검 서약</div>
      <div class="topbar-sub" id="pledge-zone-title"></div>
    </div>
    <div class="topbar-badge" id="pledge-shift-badge">주간</div>
  </div>
  <div class="card" style="margin-top:12px;">
    <div class="card-label">⚠ 오늘 제출 현황</div>
    <div id="history-list"><div class="empty-msg">조회 중...</div></div>
  </div>
  <div class="card">
    <div class="card-label">서약서</div>
    <div class="pledge-box">
      본인은 오늘(<strong id="pledge-date"></strong>) <strong id="pledge-zone-text"></strong> 구역에 대해<br>
      VD5 창고 점검 체크리스트를 <strong>성실히 수행</strong>하고<br>
      이상 사항 발견 시 즉시 보고할 것을 서약합니다.
    </div>
    <label class="pledge-check">
      <input type="checkbox" id="pledge-agree">
      <span>위 서약 내용에 동의합니다.</span>
    </label>
  </div>
  <div style="padding:12px;">
    <button class="btn btn-primary" id="btn-pledge" disabled>점검 시작</button>
  </div>
  <div class="banner" id="pledge-msg"></div>
</div>

<!-- ══════════════════════════════════════════════════════
  SCREEN 3: 체크리스트
══════════════════════════════════════════════════════ -->
<div class="screen" id="screen-checklist">
  <div class="topbar">
    <div class="topbar-logo">KD</div>
    <div class="topbar-info">
      <div class="topbar-title" id="check-title">VD5 점검</div>
      <div class="topbar-sub" id="check-subtitle"></div>
    </div>
    <div class="topbar-badge" id="check-shift-badge">주간</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-info">
      <span id="prog-label">0 / 0 완료</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div id="checklist-body"></div>
  <div class="extra-section">
    <div class="card-label" style="margin-bottom:8px;">📋 추가 정보</div>
    <div class="extra-row">
      <div class="input-group" style="margin:0;">
        <label>청소 예정 Rack</label>
        <input class="inp" id="clean-rack" type="text" placeholder="예: V502, V515">
      </div>
      <div class="input-group" style="margin:0;">
        <label>컴바인 예정 Bin</label>
        <input class="inp" id="combine-bin" type="text" placeholder="예: A3-01">
      </div>
    </div>
    <div class="input-group">
      <label>특이사항</label>
      <input class="inp" id="note-input" type="text" placeholder="이상 없으면 비워도 됩니다.">
    </div>
  </div>
  <div class="submit-area">
    <button class="btn btn-primary" id="btn-submit">제출</button>
  </div>
  <div class="banner" id="submit-msg"></div>
</div>

<!-- ══════════════════════════════════════════════════════
  SCREEN 4: 대시보드 (팀장 전용)
══════════════════════════════════════════════════════ -->
<div class="screen" id="screen-dashboard">
  <div class="topbar">
    <div class="topbar-logo">KD</div>
    <div class="topbar-info">
      <div class="topbar-title">팀장 대시보드</div>
      <div class="topbar-sub" id="dash-user-info"></div>
    </div>
    <button class="topbar-back" id="btn-dash-logout" title="로그아웃">⏻</button>
  </div>
  <div class="dash-tabs">
    <button class="dash-tab active" data-tab="today">오늘 현황</button>
    <button class="dash-tab" data-tab="date">날짜 조회</button>
    <button class="dash-tab" data-tab="weekly">주간 요약</button>
  </div>

  <!-- 탭: 오늘 현황 -->
  <div class="dash-pane active" id="dash-today">
    <div class="kpi-grid" id="kpi-today"></div>
    <div class="card-label" style="padding:0 0 8px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);font-weight:600;">구역별 현황</div>
    <div class="zone-list" id="zone-list-today"></div>
  </div>

  <!-- 탭: 날짜 조회 -->
  <div class="dash-pane" id="dash-date">
    <div class="date-row">
      <input type="date" id="date-picker">
      <button class="btn btn-outline btn-sm" id="btn-date-search">조회</button>
    </div>
    <div class="kpi-grid" id="kpi-date"></div>
    <div class="zone-list" id="zone-list-date"></div>
  </div>

  <!-- 탭: 주간 요약 -->
  <div class="dash-pane" id="dash-weekly">
    <div id="weekly-kpi" style="margin-bottom:12px;"></div>
    <div class="card-label" style="padding:0 0 8px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);font-weight:600;">담당자별 성과</div>
    <div style="overflow-x:auto;">
      <table class="weekly-table" id="weekly-person-table">
        <thead><tr><th>담당자</th><th>구역</th><th>제출수</th><th>평균달성률</th><th>NG합계</th></tr></thead>
        <tbody id="weekly-person-body"></tbody>
      </table>
    </div>
    <div class="card-label" style="padding:12px 0 8px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);font-weight:600;">날짜별 현황</div>
    <div id="weekly-by-date"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" id="bottom-nav">
  <button class="nav-btn active" id="nav-check" data-screen="checklist">
    <span class="nav-icon">☑</span>점검
  </button>
  <button class="nav-btn" id="nav-history" data-screen="history">
    <span class="nav-icon">📋</span>내 기록
  </button>
</nav>

<!-- SPINNER -->
<div class="spinner-overlay" id="spinner"><div class="spinner"></div></div>

</div><!-- /app -->

<script>
// ============================================================
//  CONFIG
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbzase7JMrq0tqrFN-pdjkrVbxGveyNi9mDgDGQ0agL2k8E3qXX7SXE-8fq9615F_BAUjw/exec';

// 마감 기준 (HH:MM, 24hr, Ho Chi Minh 기준)
const DEADLINE = { day: '08:30', night: '20:30' };

// ============================================================
//  STATE
// ============================================================
let user = null;   // { name, zone, zone_label, role, shift }
let items = [];    // checklist items
let checkState = {}; // code → { ok: bool, memo: '' }
let dashData = {};

// ============================================================
//  UTILS
// ============================================================
const $ = id => document.getElementById(id);
const show = id => { $(id).classList.add('active'); };
const hide = id => { $(id).classList.remove('active'); };
const loading = v => { $('spinner').classList.toggle('show', v); };
const today = () => new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Ho_Chi_Minh' });
const now   = () => new Date().toLocaleTimeString('sv-SE', { timeZone: 'Asia/Ho_Chi_Minh', hour:'2-digit', minute:'2-digit' });
const fmt   = d  => new Date(d).toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'});

function banner(id, msg, type = 'ok', dur = 4000) {
  const el = $(id);
  el.textContent = msg;
  el.className = 'banner ' + type + ' show';
  if (dur) setTimeout(() => el.classList.remove('show'), dur);
}

function bindBtn(id, fn) {
  const el = $(id);
  if (!el) return;
  let fired = false;
  const handler = e => {
    e.preventDefault();
    if (fired) return;
    fired = true;
    setTimeout(() => fired = false, 400);
    fn(e);
  };
  el.addEventListener('touchstart', handler, { passive: false });
  el.addEventListener('click', handler);
}

async function apiCall(payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify(payload)
  });
  return res.json();
}

// ============================================================
//  SCREEN CONTROL
// ============================================================
function goScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  show('screen-' + name);
  const nav = $('bottom-nav');
  if (name === 'checklist') {
    nav.classList.add('show');
    document.querySelectorAll('.nav-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.screen === 'checklist');
    });
  } else {
    nav.classList.remove('show');
  }
}

// ============================================================
//  1. 로그인
// ============================================================
bindBtn('btn-login', async () => {
  const id = $('login-id').value.trim();
  const pw = $('login-pw').value.trim();
  if (!id || !pw) { banner('login-msg', '아이디와 비밀번호를 입력해주세요.', 'err'); return; }
  loading(true);
  try {
    const data = await apiCall({ action: 'login', id, pw });
    if (data.result === 'success') {
      user = { name: data.name, zone: data.zone, zone_label: data.zone_label, role: data.role, shift: data.shift || 'day' };
      sessionStorage.setItem('vd5_user', JSON.stringify(user));
      if (user.role === 'manager') {
        initDashboard();
      } else {
        initPledge();
      }
    } else {
      banner('login-msg', data.message || '로그인 실패', 'err');
    }
  } catch(e) {
    banner('login-msg', '서버 연결 오류', 'err');
  } finally { loading(false); }
});

$('login-pw').addEventListener('keydown', e => { if (e.key === 'Enter') $('btn-login').click(); });

// ============================================================
//  2. 서약
// ============================================================
async function initPledge() {
  const isNight = user.shift === 'night';
  $('pledge-name-title').textContent = user.name + ' 님';
  $('pledge-zone-title').textContent = (user.zone_label || user.zone) + ' 구역';
  $('pledge-date').textContent = today();
  $('pledge-zone-text').textContent = user.zone_label || user.zone;
  const badge = $('pledge-shift-badge');
  badge.textContent = isNight ? '야간' : '주간';
  badge.className = 'topbar-badge' + (isNight ? ' night' : '');
  $('pledge-agree').checked = false;
  $('btn-pledge').disabled = true;

  goScreen('pledge');
  loading(true);
  try {
    const hist = await apiCall({ action: 'getHistory', zone: user.zone, name: user.name });
    renderHistory(hist.history || []);
  } catch(e) {
    $('history-list').innerHTML = '<div class="empty-msg">히스토리 조회 실패</div>';
  } finally { loading(false); }
}

$('pledge-agree').addEventListener('change', e => {
  $('btn-pledge').disabled = !e.target.checked;
});

bindBtn('btn-pledge', async () => {
  if (!$('pledge-agree').checked) return;
  loading(true);
  try {
    const data = await apiCall({ action: 'getItems', zone: user.zone });
    items = data.items || [];
    checkState = {};
    items.forEach(it => { checkState[it.code] = { ok: false, ng: false, memo: '' }; });
    renderChecklist();
    goScreen('checklist');
  } catch(e) {
    banner('pledge-msg', '항목 조회 실패', 'err');
  } finally { loading(false); }
});

function renderHistory(list) {
  const el = $('history-list');
  if (!list || list.length === 0) {
    el.innerHTML = '<div class="empty-msg" style="padding:16px 0;font-size:13px;">오늘 제출 내역 없음</div>';
    return;
  }
  el.innerHTML = list.map(h => {
    const rate = h.total > 0 ? Math.round(h.done / h.total * 100) : 0;
    const time = String(h.datetime || '').substring(11, 16);
    const hasNG = h.ngCount > 0;
    const ngDetailHtml = hasNG && h.ngDetail
      ? `<button class="ng-detail-toggle" onclick="toggleNGDetail(this)">
           ▶ NG 상세 (${h.ngCount}건)
         </button>
         <div class="ng-detail-body">${escapeHtml(h.ngDetail).replace(/,/g, '<br>')}</div>`
      : (hasNG ? `<span class="hi-ng">⚠ NG ${h.ngCount}건</span>` : '');
    return `<div class="history-item">
      <div class="hi-top">
        <span class="hi-name">${escapeHtml(h.name)}</span>
        <span class="hi-time">${time}</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:4px;">
        <span class="hi-rate">${rate}%</span>
        <span style="font-size:12px;color:var(--sub);">${h.done}/${h.total} 완료</span>
      </div>
      ${ngDetailHtml}
    </div>`;
  }).join('');
}

function toggleNGDetail(btn) {
  const body = btn.nextElementSibling;
  const open = body.classList.toggle('open');
  btn.textContent = (open ? '▼' : '▶') + btn.textContent.slice(1);
}

// ============================================================
//  3. 체크리스트
// ============================================================
function renderChecklist() {
  const isNight = user.shift === 'night';
  $('check-title').textContent = (user.zone_label || user.zone) + ' 점검';
  $('check-subtitle').textContent = user.name + ' · ' + today();
  const badge = $('check-shift-badge');
  badge.textContent = isNight ? '야간' : '주간';
  badge.className = 'topbar-badge' + (isNight ? ' night' : '');

  const body = $('checklist-body');
  if (items.length === 0) {
    body.innerHTML = '<div class="empty-msg">오늘 점검 항목 없음</div>';
    return;
  }

  // 타입별 그룹
  const groups = {};
  items.forEach(it => {
    const g = it.type || '점검';
    if (!groups[g]) groups[g] = [];
    groups[g].push(it);
  });

  body.innerHTML = Object.entries(groups).map(([gname, gitems]) => {
    const rows = gitems.map(it => `
      <div class="check-item" id="ci-${it.code}">
        <div class="check-item-row" data-code="${it.code}">
          <div class="check-icon" id="icon-${it.code}">—</div>
          <div style="flex:1">
            <div class="check-label">${escapeHtml(it.label)}</div>
            <div class="check-code">${it.code}</div>
          </div>
          <button class="ng-toggle" id="ngtog-${it.code}" style="display:none;" data-code="${it.code}">NG ▼</button>
        </div>
        <div class="ng-memo" id="ngmemo-${it.code}">
          <textarea id="ngtxt-${it.code}" placeholder="${it.ng_required ? '⚠ NG 원인 필수 입력' : 'NG 메모 (선택)'}" rows="3"></textarea>
        </div>
      </div>`).join('');
    return `<div class="section-head">${escapeHtml(gname)}</div>${rows}`;
  }).join('');

  // 이벤트 연결
  body.querySelectorAll('.check-item-row').forEach(row => {
    row.addEventListener('click', () => toggleCheck(row.dataset.code));
  });
  body.querySelectorAll('.ng-toggle').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      toggleNGMemo(btn.dataset.code);
    });
  });

  updateProgress();
}

function toggleCheck(code) {
  const st = checkState[code];
  if (!st.ok && !st.ng) {
    // none → ok
    st.ok = true; st.ng = false;
    applyCheckStyle(code, 'ok');
  } else if (st.ok) {
    // ok → ng
    st.ok = false; st.ng = true;
    applyCheckStyle(code, 'ng');
    $('ngtog-' + code).style.display = '';
    openNGMemo(code);
  } else {
    // ng → none
    st.ok = false; st.ng = false;
    closeNGMemo(code);
    applyCheckStyle(code, 'none');
    $('ngtog-' + code).style.display = 'none';
  }
  updateProgress();
}

function applyCheckStyle(code, state) {
  const ci   = $('ci-' + code);
  const icon = $('icon-' + code);
  ci.classList.remove('done', 'ng');
  if (state === 'ok') { ci.classList.add('done'); icon.textContent = '✓'; }
  else if (state === 'ng') { ci.classList.add('ng'); icon.textContent = '!'; }
  else { icon.textContent = '—'; }
}

function toggleNGMemo(code) {
  const memo = $('ngmemo-' + code);
  memo.classList.toggle('open');
}
function openNGMemo(code) { $('ngmemo-' + code).classList.add('open'); }
function closeNGMemo(code) { $('ngmemo-' + code).classList.remove('open'); }

function updateProgress() {
  const total = items.length;
  const done  = items.filter(it => checkState[it.code]?.ok || checkState[it.code]?.ng).length;
  const pct   = total > 0 ? Math.round(done / total * 100) : 0;
  $('prog-label').textContent = `${done} / ${total} 완료`;
  $('prog-pct').textContent   = pct + '%';
  $('prog-fill').style.width  = pct + '%';
}

// ── 제출 ────────────────────────────────────────────────────
bindBtn('btn-submit', async () => {
  // 유효성 검사
  const ngItems  = items.filter(it => checkState[it.code]?.ng);
  const doneItems = items.filter(it => checkState[it.code]?.ok || checkState[it.code]?.ng);

  // ng_required 메모 누락 체크
  for (const it of ngItems) {
    if (it.ng_required && !($('ngtxt-' + it.code)?.value.trim())) {
      banner('submit-msg', `[${it.code}] NG 원인을 입력해주세요.`, 'err');
      $('ngmemo-' + it.code).classList.add('open');
      return;
    }
  }

  const ngDetails = ngItems.map(it => {
    const memo = $('ngtxt-' + it.code)?.value.trim() || '';
    return `${it.code}: ${memo || 'NG'}`;
  }).join(', ');

  const payload = {
    action:     'submit',
    name:       user.name,
    zone:       user.zone,
    shift:      user.shift,
    totalItems: items.length,
    doneItems:  doneItems.length,
    ngCount:    ngItems.length,
    ngDetail:   ngDetails,
    cleanRack:  $('clean-rack').value.trim(),
    combineBin: $('combine-bin').value.trim(),
    note:       $('note-input').value.trim()
  };

  loading(true);
  try {
    const res = await apiCall(payload);
    if (res.result === 'success') {
      banner('submit-msg', '✅ 제출 완료!', 'ok', 0);
      $('btn-submit').disabled = true;
      $('btn-submit').textContent = '제출 완료';
      $('btn-submit').style.opacity = '.5';
    } else if (res.result === 'duplicate') {
      banner('submit-msg', '이미 오늘 제출하셨습니다.', 'warn');
    } else {
      banner('submit-msg', res.message || '제출 실패', 'err');
    }
  } catch(e) {
    banner('submit-msg', '서버 오류: ' + e.message, 'err');
  } finally { loading(false); }
});

// ============================================================
//  4. 대시보드 (팀장)
// ============================================================
function initDashboard() {
  $('dash-user-info').textContent = user.name + ' · 팀장';
  goScreen('dashboard');
  loadDashToday();
  // 날짜 조회 초기값
  $('date-picker').value = today();
}

// 탭 전환
document.querySelectorAll('.dash-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.dash-pane').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    $('dash-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'today') loadDashToday();
    if (tab.dataset.tab === 'weekly') loadDashWeekly();
  });
});

bindBtn('btn-date-search', () => {
  const d = $('date-picker').value;
  if (!d) return;
  loadDashByDate(d);
});

bindBtn('btn-dash-logout', () => {
  sessionStorage.removeItem('vd5_user');
  user = null;
  goScreen('login');
});

async function loadDashToday() {
  loading(true);
  try {
    const res = await apiCall({ action: 'getDashboard', mode: 'today' });
    renderDashZones(res, 'today');
  } catch(e) {} finally { loading(false); }
}

async function loadDashByDate(date) {
  loading(true);
  try {
    const res = await apiCall({ action: 'getDashboard', mode: 'date', date });
    renderDashZones(res, 'date');
  } catch(e) {} finally { loading(false); }
}

async function loadDashWeekly() {
  loading(true);
  try {
    const res = await apiCall({ action: 'getDashboard', mode: 'weekly' });
    renderWeekly(res);
  } catch(e) {} finally { loading(false); }
}

function renderDashZones(res, pane) {
  const suffix = pane === 'today' ? 'today' : 'date';
  const records   = res.records   || [];
  const allZones  = res.allZones  || [];
  const summary   = res.summary   || {};
  const missingZones = res.missingZones || [];

  // KPI
  const kpiEl = $('kpi-' + suffix);
  kpiEl.innerHTML = `
    <div class="kpi-card"><div class="kpi-val ok">${summary.submitted || 0}</div><div class="kpi-lbl">제출 완료</div></div>
    <div class="kpi-card"><div class="kpi-val warn">${(summary.total || 0) - (summary.submitted || 0)}</div><div class="kpi-lbl">미제출</div></div>
    <div class="kpi-card"><div class="kpi-val ${(summary.ngTotal||0)>0 ? 'warn':'ok'}">${summary.ngTotal || 0}</div><div class="kpi-lbl">NG 건수</div></div>
  `;

  // 구역 목록
  const listEl = $('zone-list-' + suffix);
  const nowTime = now();

  if (allZones.length === 0 && records.length === 0) {
    listEl.innerHTML = '<div class="empty-msg">데이터 없음</div>';
    return;
  }

  // allZones 기반으로 렌더 (제출 완료 + 미제출)
  const submittedMap = {};
  records.forEach(r => { submittedMap[r.zone] = r; });

  // records에 있는데 allZones에 없는 케이스도 표시
  const allZoneKeys = new Set(allZones.map(z => z.zone));
  records.forEach(r => {
    if (!allZoneKeys.has(r.zone)) allZones.push({ zone: r.zone, label: r.zone, name: r.name, shift: r.shift });
  });

  listEl.innerHTML = allZones.map(z => {
    const rec = submittedMap[z.zone];
    const isShiftNight = z.shift === 'night';
    const deadline = isShiftNight ? DEADLINE.night : DEADLINE.day;
    const isMissing = !rec;
    const isPastDeadline = isMissing && pane === 'today' && nowTime > deadline;

    let ngHtml = '';
    if (rec && rec.ngCount > 0) {
      ngHtml = rec.ngDetail
        ? `<button class="ng-detail-toggle" style="margin-top:4px;" onclick="toggleNGDetail(this)">
             ▶ NG ${rec.ngCount}건 상세
           </button>
           <div class="ng-detail-body">${escapeHtml(rec.ngDetail).replace(/,/g, '<br>')}</div>`
        : `<span style="font-size:12px;color:var(--warn);margin-top:4px;display:block;">⚠ NG ${rec.ngCount}건</span>`;
    }

    const rate = rec ? (rec.total > 0 ? Math.round(rec.done / rec.total * 100) : 0) : null;
    const shiftTag = `<span class="tag ${isShiftNight ? 'tag-night' : 'tag-day'}">${isShiftNight ? '야간' : '주간'}</span>`;

    return `<div class="zone-row ${isMissing ? 'missing' : 'done'}">
      <span class="zone-status">${isMissing ? '✗' : '✓'}</span>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <span class="zone-name">${escapeHtml(z.label || z.zone)}</span>
          ${shiftTag}
        </div>
        <div class="zone-sub">${z.name}${rec ? ' · ' + String(rec.datetime||'').substring(11,16) + ' 제출 · ' + rate + '%' : ' · 미제출'}</div>
        ${ngHtml}
      </div>
      ${isPastDeadline ? `<span class="missing-deadline">마감 초과</span>` : ''}
    </div>`;
  }).join('');
}

function renderWeekly(res) {
  if (!res || res.result !== 'success') { $('weekly-person-body').innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--sub);">데이터 없음</td></tr>'; return; }

  // KPI
  $('weekly-kpi').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-val">${res.totalSubmit || 0}</div><div class="kpi-lbl">총 제출</div></div>
      <div class="kpi-card"><div class="kpi-val warn">${res.totalNG || 0}</div><div class="kpi-lbl">총 NG</div></div>
      <div class="kpi-card"><div class="kpi-val ok">${res.weekStart || ''}</div><div class="kpi-lbl">주 시작일</div></div>
    </div>`;

  // 담당자별
  const tbody = $('weekly-person-body');
  const persons = res.byPerson || [];
  if (persons.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--sub);padding:20px;">이번 주 데이터 없음</td></tr>';
  } else {
    tbody.innerHTML = persons.sort((a,b) => b.avgRate - a.avgRate).map(p => `
      <tr>
        <td style="font-weight:700;">${escapeHtml(p.name)}</td>
        <td style="color:var(--sub);font-size:11px;">${escapeHtml(p.zone)}</td>
        <td>${p.submitCount}</td>
        <td>
          ${p.avgRate}%
          <span class="rate-bar"><span class="rate-fill" style="width:${p.avgRate}%"></span></span>
        </td>
        <td style="color:${p.ngTotal>0?'var(--warn)':'var(--ok)'};">${p.ngTotal}</td>
      </tr>`).join('');
  }

  // 날짜별
  const byDate = res.byDate || {};
  const dateEl = $('weekly-by-date');
  const dates  = Object.keys(byDate).sort().reverse();
  if (dates.length === 0) { dateEl.innerHTML = '<div class="empty-msg">날짜 데이터 없음</div>'; return; }
  dateEl.innerHTML = dates.map(d => {
    const day   = byDate[d];
    const count = day.records.length;
    return `<div class="card" style="margin:0 0 8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-weight:700;">${d}</span>
        <span style="font-size:12px;color:var(--sub);">제출 ${count}건 · NG ${day.ngTotal}건</span>
      </div>
      ${day.records.map(r => {
        const rate = r.total > 0 ? Math.round(r.done / r.total * 100) : 0;
        const hasNG = r.ngCount > 0;
        const ngHtml = hasNG && r.ngDetail
          ? `<button class="ng-detail-toggle" onclick="toggleNGDetail(this)">▶ NG ${r.ngCount}건</button>
             <div class="ng-detail-body">${escapeHtml(r.ngDetail).replace(/,/g, '<br>')}</div>`
          : '';
        return `<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;">
          <span style="font-size:13px;font-weight:600;min-width:64px;">${escapeHtml(r.name)}</span>
          <span style="font-size:12px;color:var(--sub);flex:1;">${escapeHtml(r.zone)}</span>
          <span style="font-size:13px;font-weight:700;color:var(--ok);">${rate}%</span>
          <span style="font-size:11px;color:var(--sub);">${String(r.datetime||'').substring(11,16)}</span>
        </div>${ngHtml}`;
      }).join('')}
    </div>`;
  }).join('');
}

// ============================================================
//  HELPERS
// ============================================================
function escapeHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================================================
//  AUTO-LOGIN (session restore)
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('vd5_user');
  if (saved) {
    try {
      user = JSON.parse(saved);
      if (user.role === 'manager') initDashboard();
      else initPledge();
    } catch(e) { /* ignore */ }
  }
});
</script>
